<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#1f4f7a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="旬数計算"><link rel="manifest" href="./manifest.webmanifest"><link rel="apple-touch-icon" href="./icon-192.png"><title>定期券 旬数計算 v2.1</title><style>:root{--bg:#f4f6f8;--card:#fff;--text:#18212a;--muted:#65717d;--line:#d8dee5;--accent:#1f4f7a;--soft:#e8f0f7;--danger:#b3261e;--ok:#176b3a}@media(prefers-color-scheme:dark){:root{--bg:#11161b;--card:#192027;--text:#edf2f7;--muted:#aab4bf;--line:#35404a;--accent:#78b5ea;--soft:#20394e;--danger:#ffb4ab;--ok:#8bd4a8}}*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;background:var(--bg);color:var(--text);line-height:1.55}main{width:min(780px,100%);margin:auto;padding:18px 14px calc(48px + env(safe-area-inset-bottom))}h1{margin:4px 0 4px;font-size:clamp(24px,6vw,34px)}.version{color:var(--muted);font-size:12px}.lead{margin:4px 0 16px;color:var(--muted);font-size:14px}.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px;margin-top:14px;box-shadow:0 5px 18px rgba(0,0,0,.04)}.grid{display:grid;gap:13px}@media(min-width:640px){.inputs{grid-template-columns:repeat(2,1fr)}.summary{grid-template-columns:repeat(3,1fr)}}label{display:grid;gap:6px;font-weight:700;font-size:14px}input,select{width:100%;min-height:46px;padding:9px 10px;border:1px solid var(--line);border-radius:10px;background:var(--card);color:var(--text);font:inherit}input[readonly]{background:var(--soft)}button{width:100%;min-height:48px;margin-top:14px;border:0;border-radius:12px;background:var(--accent);color:#fff;font-size:17px;font-weight:800}.error,.warning{margin-top:12px;padding:10px 12px;border-radius:10px;font-weight:700;display:none}.error{color:var(--danger);background:var(--soft)}.warning{background:var(--soft)}.summary{display:grid;gap:10px}.metric{background:var(--soft);border-radius:12px;padding:12px}.metric small{display:block;color:var(--muted);font-weight:700}.metric strong{font-size:20px}h2{margin:0 0 10px;font-size:20px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{border-collapse:collapse;width:100%;min-width:610px}th,td{padding:10px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}th{background:var(--soft);font-size:13px}tr:last-child td{border-bottom:0}tr.current{outline:2px solid var(--accent);outline-offset:-2px;font-weight:800}.badge{display:inline-block;padding:2px 8px;border-radius:999px;background:var(--accent);color:#fff;font-size:12px}.done{color:var(--ok);font-weight:800}.hidden{display:none}.test{font-size:12px;color:var(--muted);margin-top:10px}.test.ok{color:var(--ok)}</style></head><body><main><h1>定期券 旬数計算</h1><div class="version">v2.1 — 月末・2月・うるう年対応</div><p class="lead">定期開始日、期間、申出日から、定期終了日・旬数一覧・該当旬数を算出します。</p><section class="card"><div class="grid inputs"><label>定期開始日<input id="start" type="date"></label><label>定期の期間<select id="months"><option value="1">1箇月</option><option value="3">3箇月</option><option value="6">6箇月</option></select></label><label>定期終了日（自動計算）<input id="end" type="date" readonly></label><label>申出日<input id="request" type="date"></label></div><button id="calculate" type="button">旬数を計算</button><div id="error" class="error"></div><div id="warning" class="warning"></div><div id="selfTest" class="test"></div></section><section id="result" class="card hidden"><div class="summary"><div class="metric"><small>定期の期間</small><strong id="termOut">—</strong></div><div class="metric"><small>総旬数</small><strong id="totalOut">—</strong></div><div class="metric"><small>申出日の該当旬数</small><strong id="currentOut">—</strong></div></div></section><section id="list" class="card hidden"><h2>旬数一覧</h2><div class="table-wrap"><table><thead><tr><th>旬数</th><th>開始日</th><th>終了日</th><th>日数</th><th>状態</th></tr></thead><tbody id="tbody"></tbody></table></div></section></main><script>
"use strict";const VERSION="2.1.0",$=id=>document.getElementById(id);function parseDate(v){if(!v)return null;const[y,m,d]=v.split("-").map(Number);return new Date(y,m-1,d,12)}function dateOnly(d){return new Date(d.getFullYear(),d.getMonth(),d.getDate(),12)}function addDays(d,n){const r=dateOnly(d);r.setDate(r.getDate()+n);return r}function utc(d){return Date.UTC(d.getFullYear(),d.getMonth(),d.getDate())}function compare(a,b){return Math.sign(utc(a)-utc(b))}function inclusiveDays(a,b){return Math.floor((utc(b)-utc(a))/86400000)+1}function ymd(d){return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0")}function displayDate(d){return new Intl.DateTimeFormat("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"}).format(d)}function lastDayOfMonth(y,m){return new Date(y,m+1,0,12).getDate()}
function periodEnd(start,months){const raw=start.getMonth()+months,y=start.getFullYear()+Math.floor(raw/12),m=((raw%12)+12)%12,max=lastDayOfMonth(y,m);if(start.getDate()<=max)return addDays(new Date(y,m,start.getDate(),12),-1);return new Date(y,m,max,12)}
function monthlyBlocks(start,months){const blocks=[];let blockStart=dateOnly(start);for(let i=0;i<months;i++){const remaining=months-i;const blockEnd=remaining===1?periodEnd(start,months):periodEnd(blockStart,1);blocks.push({start:blockStart,end:blockEnd});blockStart=addDays(blockEnd,1)}return blocks}
function buildPeriods(start,months){const periods=[];let no=1;for(const b of monthlyBlocks(start,months)){const e1=addDays(b.start,9),s2=addDays(e1,1),e2=addDays(s2,9),s3=addDays(e2,1);if(compare(s3,b.end)>0)throw new Error("1箇月区間が20日未満となるため計算できません。");periods.push({no:no++,start:b.start,end:e1},{no:no++,start:s2,end:e2},{no:no++,start:s3,end:b.end})}return periods}
function updateEnd(){const s=parseDate($("start").value);$("end").value=s?ymd(periodEnd(s,Number($("months").value))):""}function fail(m){$("error").textContent=m;$("error").style.display="block";$("warning").style.display="none";$("result").classList.add("hidden");$("list").classList.add("hidden")}
function calculate(){$("error").style.display="none";$("warning").style.display="none";const s=parseDate($("start").value),r=parseDate($("request").value),m=Number($("months").value);if(!s||!r)return fail("定期開始日と申出日を入力してください。");const e=periodEnd(s,m);let ps;try{ps=buildPeriods(s,m)}catch(x){return fail(x.message)}const cur=ps.find(p=>compare(r,p.start)>=0&&compare(r,p.end)<=0);$("termOut").textContent=m+"箇月（"+displayDate(s)+"〜"+displayDate(e)+"）";$("totalOut").textContent=(m*3)+"旬";$("currentOut").textContent=compare(r,s)<0?"使用開始前":compare(r,e)>0?"有効期間終了後":cur?cur.no+"旬目":"判定不能";const body=$("tbody");body.innerHTML="";for(const p of ps){const ic=cur&&cur.no===p.no,ip=compare(r,p.end)>0,tr=document.createElement("tr");if(ic)tr.className="current";const state=ic?'<span class="badge">該当</span>':ip?'<span class="done">経過</span>':"";tr.innerHTML="<td>"+p.no+"旬目</td><td>"+displayDate(p.start)+"</td><td>"+displayDate(p.end)+"</td><td>"+inclusiveDays(p.start,p.end)+"日</td><td>"+state+"</td>";body.appendChild(tr)}if(compare(r,s)<0||compare(r,e)>0){$("warning").textContent="申出日は定期の有効期間外です。";$("warning").style.display="block"}$("result").classList.remove("hidden");$("list").classList.remove("hidden")}
function ae(a,e,l){if(a!==e)throw new Error(l+":"+a+"≠"+e)}function runTests(){const cases=[["2026-07-14",1,"2026-08-13"],["2026-01-31",1,"2026-02-28"],["2026-01-31",3,"2026-04-30"],["2026-03-31",1,"2026-04-30"],["2028-02-29",1,"2028-03-28"],["2026-08-31",6,"2027-02-28"]];for(const[c,m,e]of cases){const s=parseDate(c);ae(ymd(periodEnd(s,m)),e,c);ae(buildPeriods(s,m).length,m*3,c)}const p=buildPeriods(parseDate("2026-07-14"),1);ae(ymd(p[0].end),"2026-07-23","1旬");ae(ymd(p[1].end),"2026-08-02","2旬");ae(ymd(p[2].end),"2026-08-13","3旬");$("selfTest").textContent="内部検証: 9項目すべて正常（v"+VERSION+"）";$("selfTest").classList.add("ok")}
$("start").addEventListener("change",updateEnd);$("months").addEventListener("change",updateEnd);$("calculate").addEventListener("click",calculate);try{runTests()}catch(e){$("selfTest").textContent="内部検証エラー: "+e.message;$("selfTest").style.color="var(--danger)"}if("serviceWorker"in navigator)window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));
</script></body></html>
